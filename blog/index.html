<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Writing — John Wright</title>
  <meta name="description" content="Writing by John Wright — notes on building, AI, data, and iGaming.">
  <link rel="canonical" href="https://johnwright.ai/blog/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#fbfbfa; --ink:#1a1a1a; --muted:#6b6b6b; --faint:#9a9a9a;
      --line:#e7e7e4; --link:#2563eb;
      --sans:"Geist",system-ui,-apple-system,sans-serif;
      --mono:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.7;-webkit-font-smoothing:antialiased}
    .wrap{max-width:680px;margin:0 auto;padding:48px 24px 96px}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:56px}
    .brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit;font-family:var(--mono);font-size:15px}
    .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--link);display:inline-block}
    nav a{font-family:var(--mono);font-size:14px;color:var(--muted);text-decoration:none;margin-left:18px}
    nav a:hover{color:var(--ink)}
    h1{font-family:var(--mono);font-weight:600;font-size:34px;line-height:1.12;letter-spacing:-.03em;margin-bottom:8px}
    .sub{color:var(--muted);font-size:17px;margin-bottom:44px}
    ul.posts{list-style:none}
    ul.posts li{border-top:1px solid var(--line)}
    ul.posts li:last-child{border-bottom:1px solid var(--line)}
    ul.posts a{text-decoration:none;color:inherit;display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:20px 0}
    ul.posts a:hover .post-title{color:var(--muted)}
    .post-title{font-size:19px;font-weight:500}
    .post-meta{font-family:var(--mono);color:var(--faint);font-size:13px;white-space:nowrap}
    footer{margin-top:72px;padding-top:24px;border-top:1px solid var(--line);font-family:var(--mono);font-size:13px;color:var(--faint)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand" href="/"><span class="dot"></span>John Wright</a>
      <nav><a href="/">Home</a><a href="/blog/">Writing</a></nav>
    </header>

    <h1>Writing</h1>
    <p class="sub">Notes on building, AI, data, and iGaming.</p>

    <!-- POSTS: add a new <li> here for each post, newest first -->
    <ul class="posts">
      <li>
        <a href="/blog/utair-and-robocup-at-the-university-of-toronto/">
          <span class="post-title">UTAIR and Robocup at the University of Toronto</span>
          <span class="post-meta">Jun 27, 2026</span>
        </a>
      </li>
      <li>
        <a href="/blog/nousviz-faq/">
          <span class="post-title">NousViz FAQ</span>
          <span class="post-meta">Jun 27, 2026</span>
        </a>
      </li>
    </ul>

    <footer>© 2026 John Wright</footer>
  </div>
</body>
</html>
