<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — John Wright</title>
  <meta name="description" content="Writing by John Wright.">
  <link rel="canonical" href="https://johnwright.ai/blog/">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fbfbfa;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .brand .mark {
      width: 40px; height: 40px; border-radius: 50%;
      background: #1a1a1a; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 15px; letter-spacing: 0.5px;
    }
    .brand .name { font-weight: 600; font-size: 16px; }
    nav a { color: #555; text-decoration: none; font-size: 15px; }
    nav a:hover { color: #1a1a1a; }
    h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .sub { color: #777; font-size: 16px; margin-bottom: 48px; }
    ul.posts { list-style: none; }
    ul.posts li { padding: 20px 0; border-bottom: 1px solid #ececec; }
    ul.posts li:first-child { border-top: 1px solid #ececec; }
    ul.posts a { text-decoration: none; color: inherit; display: block; }
    ul.posts a:hover .post-title { color: #555; }
    .post-title { font-size: 19px; font-weight: 600; }
    .post-meta { color: #999; font-size: 14px; margin-top: 4px; }
    .empty { color: #999; font-size: 16px; padding: 40px 0; }
    footer { margin-top: 64px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand" href="/">
        <span class="mark">JW</span>
        <span class="name">John Wright</span>
      </a>
      <nav><a href="/">Home</a></nav>
    </header>

    <h1>Blog</h1>
    <p class="sub">Notes on building, AI, and iGaming.</p>

    <!-- POSTS: add a new <li> here for each post, newest first -->
    <ul class="posts">
      <li>
        <a href="/blog/nousviz-faq/">
          <span class="post-title">NousViz FAQ</span>
          <span class="post-meta">June 27, 2026</span>
        </a>
      </li>
    </ul>

    <footer>© John Wright</footer>
  </div>
</body>
</html>
